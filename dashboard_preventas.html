<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Preventas — VAROSA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ============================================================
     VAROSA — Dashboard de Preventas (v2)
     Efectividad = Cobertura + Conversión (separadas).
     COTIZADO no suma como venta. BLOQUEADO POR CXC fuera del cálculo.
     Lee del endpoint existente preventas-data (no toca n8n).
     ============================================================ */
  :root {
    --varosa-cyan: #15C9E4;
    --varosa-blue: #4672B1;
    --varosa-gold: #FFAD00;
    --varosa-dark: #325895;
    --bg-main: #f0f2f5;
    --bg-card: #ffffff;
    --border-light: #e2e8f0;
    --text-primary: #1e293b;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    --text-on-dark: #f8fafc;
    --ok: #16a34a;
    --warn: #f59e0b;
    --bad: #dc2626;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius: 10px;
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
    --transition: 150ms ease;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--bg-main); color: var(--text-primary); font-size: 13px; line-height: 1.4; }
  .app { max-width: 1280px; margin: 0 auto; padding: 16px; }

  /* HEADER */
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px;
    background: linear-gradient(135deg, var(--varosa-dark) 0%, var(--varosa-blue) 100%);
    border-radius: var(--radius); color: var(--text-on-dark);
    flex-wrap: wrap; gap: 8px; box-shadow: var(--shadow-md);
  }
  .app-header h1 { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .app-header h1::before { content: ''; width: 3px; height: 22px; background: var(--varosa-gold); border-radius: 2px; }
  .header-meta { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .header-user { font-size: 11px; opacity: 0.9; font-family: var(--font-mono); }
  .header-actions button {
    padding: 7px 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
    color: var(--text-on-dark); border-radius: 6px; font-family: var(--font-body);
    font-size: 12px; font-weight: 500; cursor: pointer; transition: all var(--transition);
  }
  .header-actions button:hover { background: rgba(255,255,255,0.2); }

  /* STATUS */
  .status-bar { display: none; margin-top: 10px; padding: 9px 16px; border-radius: 8px; font-size: 12px; }
  .status-bar.visible { display: block; }
  .status-bar.loading { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
  .status-bar.error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
  .status-bar.demo { background: #fefce8; border: 1px solid #fde68a; color: #854d0e; }

  /* FILTERS */
  .filters { display: flex; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .filters .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); }
  .chip {
    padding: 6px 13px; border-radius: 20px; border: 1px solid var(--border-light); background: #fff;
    font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--text-secondary);
    cursor: pointer; transition: all var(--transition); white-space: nowrap;
  }
  .chip:hover { border-color: var(--varosa-cyan); color: var(--varosa-dark); }
  .chip.active { background: var(--varosa-dark); border-color: var(--varosa-dark); color: #fff; font-weight: 600; }
  .chip .c { font-family: var(--font-mono); font-size: 11px; opacity: 0.75; margin-left: 4px; }
  .filters select {
    padding: 7px 10px; border: 1px solid var(--border-light); border-radius: 6px;
    font-family: var(--font-body); font-size: 12.5px; background: #fff; color: var(--text-primary);
  }
  .filters select:focus { outline: none; border-color: var(--varosa-cyan); }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-top: 16px; }
  .kpi {
    background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--shadow-md); position: relative; overflow: hidden;
  }
  .kpi::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--varosa-blue); }
  .kpi.k-warn::before { background: var(--warn); }
  .kpi.k-bad::before { background: var(--bad); }
  .kpi.k-ok::before { background: var(--ok); }
  .kpi.k-gold::before { background: var(--varosa-gold); }
  .kpi.k-neutral::before { background: var(--text-muted); }
  .kpi .k-lbl { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); font-weight: 600; }
  .kpi .k-val { font-family: var(--font-mono); font-size: 26px; font-weight: 700; line-height: 1.1; margin-top: 6px; color: var(--text-primary); }
  .kpi .k-val.small { font-size: 19px; }
  .kpi .k-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .kpi .k-sub b { color: var(--text-secondary); font-family: var(--font-mono); }

  /* SECTIONS */
  .row { display: grid; gap: 12px; margin-top: 14px; }
  .row.r-charts { grid-template-columns: 1fr 1fr 1fr; }
  .panel { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius); box-shadow: var(--shadow-md); padding: 16px 18px; }
  .panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 12px; font-weight: 600; }
  .panel h3 .h-extra { float: right; font-family: var(--font-mono); color: var(--text-muted); text-transform: none; letter-spacing: 0; }
  .chart-wrap { position: relative; height: 210px; }

  /* EMBUDO */
  .funnel { display: flex; align-items: stretch; gap: 0; flex-wrap: wrap; }
  .funnel-stage { flex: 1; min-width: 120px; text-align: center; padding: 16px 12px; background: #f8fafc; border: 1px solid var(--border-light); border-radius: 8px; }
  .funnel-stage .fs-n { font-family: var(--font-mono); font-size: 28px; font-weight: 700; color: var(--varosa-dark); }
  .funnel-stage .fs-l { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); font-weight: 600; margin-top: 2px; }
  .funnel-stage .fs-x { font-size: 10.5px; color: var(--text-muted); margin-top: 3px; }
  .funnel-arrow { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 16px; min-width: 100px; }
  .funnel-arrow .fa-rate { font-family: var(--font-mono); font-size: 18px; font-weight: 700; }
  .funnel-arrow .fa-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 600; }
  .funnel-arrow .fa-line { font-size: 16px; color: var(--text-muted); margin-top: 2px; }
  .funnel-note { margin-top: 10px; font-size: 11.5px; color: var(--text-muted); }
  .funnel-note b { color: var(--bad); font-family: var(--font-mono); }

  /* TABLES */
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 600; text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border-light); }
  thead th.r { text-align: right; }
  tbody td { padding: 8px; font-size: 12.5px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  tbody td.r { text-align: right; font-family: var(--font-mono); }
  tbody tr:last-child td { border-bottom: none; }
  .nombre { font-weight: 600; color: var(--text-primary); }
  .barcell { width: 22%; min-width: 130px; }
  .bar-track { background: #eef2f7; border-radius: 6px; height: 16px; position: relative; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width var(--transition); }
  .bar-pct { font-family: var(--font-mono); font-size: 11.5px; font-weight: 600; margin-left: 8px; min-width: 36px; text-align: right; }
  .ef-ok { color: var(--ok); } .ef-warn { color: var(--warn); } .ef-bad { color: var(--bad); } .ef-neutral { color: var(--text-muted); }
  .bg-ok { background: var(--ok); } .bg-warn { background: var(--warn); } .bg-bad { background: var(--bad); } .bg-neutral { background: var(--text-muted); }
  .muted-sm { color: var(--text-muted); font-size: 10px; }

  /* CATEGORIA ABC */
  .cat-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .cat-pill { flex: 1; min-width: 60px; text-align: center; padding: 10px; border-radius: 8px; background: #f8fafc; border: 1px solid var(--border-light); }
  .cat-pill .cat-l { font-size: 11px; font-weight: 700; color: var(--text-secondary); }
  .cat-pill .cat-n { font-family: var(--font-mono); font-size: 20px; font-weight: 700; color: var(--varosa-dark); margin-top: 2px; }

  .footer { margin-top: 16px; padding: 10px 4px; font-size: 11px; color: var(--text-muted); text-align: center; }
  .empty { text-align: center; padding: 30px; color: var(--text-muted); }

  @media (max-width: 1000px) {
    .kpi-grid { grid-template-columns: repeat(3, 1fr); }
    .row.r-charts { grid-template-columns: 1fr; }
    .funnel-arrow { min-width: 70px; padding: 0 6px; }
  }
  @media (max-width: 560px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>Dashboard de Preventas</h1>
    <div class="header-meta">
      <span class="header-user" id="lblUsuario"></span>
      <span class="header-user" id="lblActualizado"></span>
      <span class="header-actions"><button id="btnRefrescar" type="button">&#8635; Actualizar</button></span>
    </div>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div class="filters" id="filtros">
    <span class="lbl">Ruta:</span>
    <span id="rutaChips"></span>
    <span id="boWrap" style="display:none;margin-left:8px;">
      <span class="lbl">Backoffice:</span>
      <select id="selBackoffice"><option value="">Todos</option></select>
    </span>
  </div>

  <!-- KPI CARDS -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- EMBUDO DEL CICLO -->
  <div class="row">
    <div class="panel">
      <h3>Embudo del ciclo <span class="h-extra">Vendibles &#8594; Contactados &#8594; Pidieron</span></h3>
      <div id="funnel" style="text-align:center;"></div>
      <div class="funnel-note" id="funnelNote"></div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="row r-charts">
    <div class="panel"><h3>Distribuci&#243;n por estado</h3><div class="chart-wrap"><canvas id="chartEstado"></canvas></div></div>
    <div class="panel"><h3>Estado de cobro</h3><div class="chart-wrap"><canvas id="chartCobro"></canvas></div></div>
    <div class="panel"><h3>Por categor&#237;a ABC</h3><div class="cat-row" id="catRow" style="margin-top:8px;"></div></div>
  </div>

  <!-- TABLA RUTA -->
  <div class="row">
    <div class="panel">
      <h3>Efectividad por ruta <span class="h-extra" id="rutaCount"></span></h3>
      <div id="tablaRuta"></div>
    </div>
  </div>

  <!-- TABLA BACKOFFICE -->
  <div class="row">
    <div class="panel" id="panelBackoffice">
      <h3>Desempe&#241;o por backoffice <span class="h-extra" id="boCount"></span></h3>
      <div id="tablaBackoffice"></div>
    </div>
  </div>

  <div class="footer" id="footer"></div>
</div>

<script>
// ============================================================
// CONFIG — reusa el endpoint existente del Centro de Operaciones
// ============================================================
const N8N_BASE = 'https://n8n-n8n.1efluw.easypanel.host';
const ENDPOINT_DATOS = N8N_BASE + '/webhook/preventas-data';

const URL_PARAMS = new URLSearchParams(window.location.search);
const USUARIO_ACTUAL = (URL_PARAMS.get('usuario') || URL_PARAMS.get('user') || '').trim().toLowerCase();

// ---- Definiciones de efectividad (decididas con el equipo) ----
// Pidieron = PIDIO + CONFIRMADO. COTIZADO NO suma (es paso intermedio).
const ESTADOS_PEDIDO = ['PIDIO', 'CONFIRMADO'];
const ESTADO_BLOQUEADO = 'BLOQUEADO POR CXC'; // fuera del cálculo de tasas

// ---- Metas / umbrales de color (AJUSTABLES: cambiá estos números a tus metas reales) ----
const META_COBERTURA = { verde: 80, ambar: 50 };   // verde >=80 bueno, ambar 50-79 regular, rojo <50 malo
const META_CONVERSION = { verde: 80, ambar: 50 };  // misma escala (ajustable si quieres otra para conversion)

const ESTADOS_CFG = {
  'NO_CONTACTADO':     { label: 'No contactado', color: '#e74c3c' },
  'CONTACTADO':        { label: 'Contactado',    color: '#f39c12' },
  'PIDIO':             { label: 'Pidi\u00f3',     color: '#2980b9' },
  'COTIZADO':          { label: 'Cotizado',      color: '#8e44ad' },
  'NO_NECESITA':       { label: 'No necesita',   color: '#95a5a6' },
  'CONFIRMADO':        { label: 'Confirmado',    color: '#27ae60' },
  'BLOQUEADO POR CXC': { label: 'Bloq. CxC',     color: '#7f1d1d' }
};
const COBRO_CFG = {
  'PENDIENTE':       { label: 'Sin gestionar', color: '#94a3b8' },
  'EC_ENVIADO':      { label: 'EC enviado',    color: '#e67e22' },
  'COBRO_REALIZADO': { label: 'Cobrado',       color: '#283593' }
};
const CAT_ORDER = ['A', 'B', 'C', 'D'];

// ===== ESTADO GLOBAL =====
let registros = [];
let esAdmin = false;
let filtros = { ruta: '', backoffice: '' };
let MODO_DEMO = false;
let chartEstado = null, chartCobro = null;

// ===== HELPERS =====
function num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function fmtMoneyK(v) {
  const n = num(v);
  if (n >= 1000000) return '\u20A1' + (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return '\u20A1' + Math.round(n / 1000) + 'K';
  return '\u20A1' + Math.round(n);
}
function esc(s) { const d = document.createElement('div'); d.textContent = (s == null) ? '' : String(s); return d.innerHTML; }
function rnd(p) { return Math.round(p); }
function clsCobertura(p) { return p >= META_COBERTURA.verde ? 'ok' : (p >= META_COBERTURA.ambar ? 'warn' : 'bad'); }
function clsConversion(p) { return p >= META_CONVERSION.verde ? 'ok' : (p >= META_CONVERSION.ambar ? 'warn' : 'bad'); }

function normalizar(r) {
  return {
    estado: (r.Estado || 'NO_CONTACTADO').trim(),
    cobro: (r.Estado_Cobro || 'PENDIENTE').trim(),
    montoPedido: num(r.Monto_Pedido_Preventa),
    montoVencido: num(r.Monto_Vencido),
    dias: num(r.Dias_Sin_Compra),
    categoria: (r.Categoria || '').trim().toUpperCase() || 'S/C',
    ruta: r.Ruta1 || 'Sin ruta',
    backoffice: r.Backoffice_New || 'Sin asignar'
  };
}
function cobroNorm(c) { return (c === 'EC_ENVIADO_EMAIL') ? 'EC_ENVIADO' : c; }

// ============================================================
// CARGA
// ============================================================
async function cargar() {
  document.getElementById('lblUsuario').textContent = USUARIO_ACTUAL || 'sin usuario';
  status('Cargando preventas...', 'loading');
  if (!USUARIO_ACTUAL) {
    cargarDemo('No se recibi\u00f3 el usuario en la URL. Mostrando datos de demostraci\u00f3n.');
    return;
  }
  try {
    const resp = await fetch(ENDPOINT_DATOS + '?usuario=' + encodeURIComponent(USUARIO_ACTUAL), { headers: { 'Accept': 'application/json' } });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (!data.success) throw new Error(data.error || 'respuesta sin success');
    MODO_DEMO = false;
    esAdmin = !!data.esAdmin;
    registros = (data.registros || []).map(normalizar);
    hideStatus();
    marcarHora();
    construirFiltros();
    render();
  } catch (e) {
    cargarDemo('Sin conexi\u00f3n con n8n (' + e.message + '). Mostrando datos de demostraci\u00f3n.');
  }
}
function cargarDemo(msg) {
  MODO_DEMO = true; esAdmin = true;
  registros = datosDemo().map(normalizar);
  status(msg, 'demo');
  marcarHora();
  construirFiltros();
  render();
}
function marcarHora() {
  const h = new Date().toLocaleTimeString('es-CR', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('lblActualizado').textContent = 'Datos: ' + h;
}

// ============================================================
// FILTROS
// ============================================================
function construirFiltros() {
  const rutas = {};
  registros.forEach(r => { rutas[r.ruta] = (rutas[r.ruta] || 0) + 1; });
  let html = '<button class="chip' + (filtros.ruta === '' ? ' active' : '') + '" data-ruta="">Todas <span class="c">' + registros.length + '</span></button>';
  Object.keys(rutas).sort().forEach(ru => {
    html += '<button class="chip' + (filtros.ruta === ru ? ' active' : '') + '" data-ruta="' + esc(ru) + '">' + esc(ru) + ' <span class="c">' + rutas[ru] + '</span></button>';
  });
  document.getElementById('rutaChips').innerHTML = html;
  document.querySelectorAll('#rutaChips .chip').forEach(ch => {
    ch.addEventListener('click', function () { filtros.ruta = this.dataset.ruta; construirFiltros(); render(); });
  });

  const boWrap = document.getElementById('boWrap');
  if (esAdmin) {
    boWrap.style.display = 'inline';
    const bos = [...new Set(registros.map(r => r.backoffice))].sort();
    const sel = document.getElementById('selBackoffice');
    sel.innerHTML = '<option value="">Todos</option>' + bos.map(b => '<option value="' + esc(b) + '"' + (filtros.backoffice === b ? ' selected' : '') + '>' + esc(b) + '</option>').join('');
    sel.onchange = function () { filtros.backoffice = this.value; render(); };
  } else {
    boWrap.style.display = 'none';
  }
}
function aplicarFiltros() {
  return registros.filter(r => {
    if (filtros.ruta && r.ruta !== filtros.ruta) return false;
    if (filtros.backoffice && r.backoffice !== filtros.backoffice) return false;
    return true;
  });
}

// ============================================================
// CÁLCULO DE KPIs
//   Cobertura  = contactados / vendibles
//   Conversión = pidieron   / contactados
//   vendibles  = total - BLOQUEADO POR CXC
//   pidieron   = PIDIO + CONFIRMADO (COTIZADO no suma)
// ============================================================
function calcular(regs) {
  const total = regs.length;
  const bloqueados = regs.filter(r => r.estado === ESTADO_BLOQUEADO).length;
  const vendibles = regs.filter(r => r.estado !== ESTADO_BLOQUEADO);
  const nVend = vendibles.length;
  const sinContactar = vendibles.filter(r => r.estado === 'NO_CONTACTADO').length;
  const contactados = nVend - sinContactar;
  const pidieron = vendibles.filter(r => ESTADOS_PEDIDO.includes(r.estado)).length;
  const cotizados = vendibles.filter(r => r.estado === 'COTIZADO').length;

  const cobertura = nVend > 0 ? (contactados * 100 / nVend) : 0;
  const conversion = contactados > 0 ? (pidieron * 100 / contactados) : 0;

  const capturado = regs.reduce((s, r) => s + r.montoPedido, 0);
  const vencido = regs.reduce((s, r) => s + r.montoVencido, 0);
  const conVencido = regs.filter(r => r.montoVencido > 0).length;
  const rutas = [...new Set(regs.map(r => r.ruta))].length;

  const ecEnviado = regs.filter(r => cobroNorm(r.cobro) === 'EC_ENVIADO').length;
  const cobrado = regs.filter(r => r.cobro === 'COBRO_REALIZADO').length;

  const distEstado = {}; regs.forEach(r => { distEstado[r.estado] = (distEstado[r.estado] || 0) + 1; });
  const distCobro = {}; regs.forEach(r => { const c = cobroNorm(r.cobro); distCobro[c] = (distCobro[c] || 0) + 1; });
  const distCat = {}; regs.forEach(r => { distCat[r.categoria] = (distCat[r.categoria] || 0) + 1; });

  const porRuta = agrupar(regs, r => r.ruta);
  const porBo = agrupar(regs, r => r.backoffice);

  return { total, bloqueados, nVend, sinContactar, contactados, pidieron, cotizados,
           cobertura, conversion, capturado, vencido, conVencido, rutas,
           ecEnviado, cobrado, distEstado, distCobro, distCat, porRuta, porBo };
}
function agrupar(regs, keyFn) {
  const m = {};
  regs.forEach(r => {
    const k = keyFn(r);
    if (!m[k]) m[k] = { nombre: k, total: 0, vendible: 0, bloqueados: 0, sinContactar: 0, contactados: 0, pidieron: 0, capturado: 0, vencido: 0 };
    const g = m[k]; g.total++;
    if (r.estado === ESTADO_BLOQUEADO) { g.bloqueados++; }
    else {
      g.vendible++;
      if (r.estado === 'NO_CONTACTADO') g.sinContactar++; else g.contactados++;
      if (ESTADOS_PEDIDO.includes(r.estado)) g.pidieron++;
    }
    g.capturado += r.montoPedido; g.vencido += r.montoVencido;
  });
  return Object.values(m).map(g => {
    g.cobertura = g.vendible > 0 ? (g.contactados * 100 / g.vendible) : 0;
    g.conversion = g.contactados > 0 ? (g.pidieron * 100 / g.contactados) : 0;
    g.tieneContacto = g.contactados > 0;
    return g;
  }).sort((a, b) => b.total - a.total);
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const regs = aplicarFiltros();
  const k = calcular(regs);
  renderKPIs(k);
  renderFunnel(k);
  renderCharts(k);
  renderCategoria(k);
  renderTablaRuta(k);
  renderTablaBackoffice(k);
  document.getElementById('panelBackoffice').style.display = esAdmin ? 'block' : 'none';
  document.getElementById('footer').textContent =
    (MODO_DEMO ? 'Modo demostraci\u00f3n \u00b7 ' : '') +
    k.total + ' preventas \u00b7 ' + k.nVend + ' vendibles \u00b7 ' + k.rutas + ' ruta(s)' +
    (filtros.ruta ? ' \u00b7 ' + filtros.ruta : '') +
    (filtros.backoffice ? ' \u00b7 ' + filtros.backoffice : '');
}

function renderKPIs(k) {
  const cobCls = clsCobertura(k.cobertura);
  const tieneContacto = k.contactados > 0;
  const conCls = tieneContacto ? clsConversion(k.conversion) : 'neutral';
  const cards = [
    { cls: '', lbl: 'Preventas activas', val: k.total,
      sub: '<b>' + k.rutas + '</b> ruta(s)' + (k.bloqueados > 0 ? ' \u00b7 <b>' + k.bloqueados + '</b> bloq. CxC' : '') },
    { cls: 'k-' + cobCls, lbl: 'Cobertura', val: rnd(k.cobertura) + '%',
      sub: '<b>' + k.contactados + '</b> de <b>' + k.nVend + '</b> contactados' },
    { cls: 'k-' + conCls, lbl: 'Conversi\u00f3n', val: tieneContacto ? rnd(k.conversion) + '%' : '\u2014',
      sub: '<b>' + k.pidieron + '</b> pidieron de <b>' + k.contactados + '</b>' + (k.cotizados > 0 ? ' \u00b7 ' + k.cotizados + ' en proceso' : '') },
    { cls: 'k-ok', lbl: 'Capturado del ciclo', val: fmtMoneyK(k.capturado), small: true, sub: 'pedidos de preventa' },
    { cls: k.vencido > 0 ? 'k-bad' : '', lbl: 'Vencido (CxC)', val: fmtMoneyK(k.vencido), small: true, sub: '<b>' + k.conVencido + '</b> con saldo' },
    { cls: 'k-gold', lbl: 'Gesti\u00f3n de cobro', val: k.ecEnviado + ' / ' + k.cobrado, small: true, sub: 'EC enviados / cobrados' }
  ];
  document.getElementById('kpiGrid').innerHTML = cards.map(c =>
    '<div class="kpi ' + c.cls + '">' +
      '<div class="k-lbl">' + c.lbl + '</div>' +
      '<div class="k-val' + (c.small ? ' small' : '') + '">' + c.val + '</div>' +
      '<div class="k-sub">' + c.sub + '</div>' +
    '</div>'
  ).join('');
}

function renderFunnel(k) {
  const cont = document.getElementById('funnel');
  document.getElementById('funnelNote').innerHTML =
    (k.bloqueados > 0 ? 'Excluidos del c\u00e1lculo: <b>' + k.bloqueados + '</b> cliente(s) BLOQUEADO POR CXC (no pueden comprar). ' : '') +
    'COTIZADO cuenta como contactado, no como venta.';

  if (k.nVend === 0) { cont.innerHTML = '<div class="empty">Sin clientes vendibles en la selecci\u00f3n</div>'; return; }

  const tieneContacto = k.contactados > 0;
  const cobCls = clsCobertura(k.cobertura);
  const conCls = tieneContacto ? clsConversion(k.conversion) : 'neutral';
  const COL = { ok: '#16a34a', warn: '#f59e0b', bad: '#dc2626', neutral: '#94a3b8' };

  // Anchos proporcionales (con piso mínimo para que la etiqueta sea legible)
  const cx = 260, maxFull = 460, wMin = 96;
  const ancho = (count, denom) => {
    if (denom <= 0) return 24;
    const w = (count / denom) * maxFull;
    return count > 0 ? Math.max(w, wMin) : 24;
  };
  const w1 = maxFull;                        // Vendibles (100%)
  const w2 = ancho(k.contactados, k.nVend);  // Contactados
  const w3 = ancho(k.pidieron, k.nVend);     // Pidieron

  const bands = [
    { wt: w1, wb: w2, y0: 12,  y1: 84,  color: '#325895', name: 'Vendibles',   val: k.nVend,        sub: k.sinContactar + ' sin contactar' },
    { wt: w2, wb: w3, y0: 84,  y1: 156, color: '#4672B1', name: 'Contactados', val: k.contactados,  sub: k.cotizados > 0 ? k.cotizados + ' en proceso' : '' },
    { wt: w3, wb: w3, y0: 156, y1: 228, color: '#16a34a', name: 'Pidieron',    val: k.pidieron,     sub: 'PIDI\u00d3 + CONFIRMADO' }
  ];

  let shapes = '';
  bands.forEach(b => {
    const xtl = cx - b.wt / 2, xtr = cx + b.wt / 2, xbl = cx - b.wb / 2, xbr = cx + b.wb / 2;
    const my = (b.y0 + b.y1) / 2;
    shapes += '<polygon points="' + xtl + ',' + b.y0 + ' ' + xtr + ',' + b.y0 + ' ' + xbr + ',' + b.y1 + ' ' + xbl + ',' + b.y1 + '" fill="' + b.color + '"/>';
    shapes += '<text x="' + cx + '" y="' + (my - 8) + '" text-anchor="middle" fill="#fff" font-family="\'DM Sans\',sans-serif" font-size="13" font-weight="600">' + b.name + '</text>';
    shapes += '<text x="' + cx + '" y="' + (my + 13) + '" text-anchor="middle" fill="#fff" font-family="\'JetBrains Mono\',monospace" font-size="20" font-weight="700">' + b.val + '</text>';
    if (b.sub) shapes += '<text x="' + cx + '" y="' + (my + 28) + '" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-family="\'DM Sans\',sans-serif" font-size="9.5">' + b.sub + '</text>';
  });

  // Etiquetas de tasa a la derecha, conectadas al borde del embudo
  const rate = (txt, pct, cls, y, xEdge, show) => {
    const c = COL[cls];
    return '<line x1="' + xEdge + '" y1="' + y + '" x2="514" y2="' + y + '" stroke="' + c + '" stroke-width="1.5" stroke-dasharray="2 3"/>' +
      '<text x="520" y="' + (y - 4) + '" fill="#64748b" font-family="\'DM Sans\',sans-serif" font-size="10.5" font-weight="600">' + txt + '</text>' +
      '<text x="520" y="' + (y + 15) + '" fill="' + c + '" font-family="\'JetBrains Mono\',monospace" font-size="18" font-weight="700">' + (show ? rnd(pct) + '%' : '\u2014') + '</text>';
  };
  const rates =
    rate('COBERTURA', k.cobertura, cobCls, 84, cx + w2 / 2, k.nVend > 0) +
    rate('CONVERSI\u00d3N', k.conversion, conCls, 156, cx + w3 / 2, tieneContacto);

  cont.innerHTML = '<svg viewBox="0 0 700 240" style="width:100%;height:auto;max-height:280px;" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Embudo de preventas: vendibles, contactados, pidieron">' + shapes + rates + '</svg>';
}

function donut(canvasId, prev, labels, data, colors) {
  if (prev) prev.destroy();
  const ctx = document.getElementById(canvasId);
  if (data.reduce((a, b) => a + b, 0) === 0) return null;
  return new Chart(ctx, {
    type: 'doughnut',
    data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '58%',
      plugins: {
        legend: { position: 'right', labels: { font: { family: "'DM Sans'", size: 11 }, boxWidth: 12, padding: 8 } },
        tooltip: { callbacks: { label: c => ' ' + c.label + ': ' + c.parsed } }
      }
    }
  });
}
function renderCharts(k) {
  const eLabels = [], eData = [], eColors = [];
  Object.keys(ESTADOS_CFG).forEach(st => { if (k.distEstado[st]) { eLabels.push(ESTADOS_CFG[st].label); eData.push(k.distEstado[st]); eColors.push(ESTADOS_CFG[st].color); } });
  Object.keys(k.distEstado).forEach(st => { if (!ESTADOS_CFG[st]) { eLabels.push(st); eData.push(k.distEstado[st]); eColors.push('#cbd5e1'); } });
  chartEstado = donut('chartEstado', chartEstado, eLabels, eData, eColors);

  const cLabels = [], cData = [], cColors = [];
  Object.keys(COBRO_CFG).forEach(c => { if (k.distCobro[c]) { cLabels.push(COBRO_CFG[c].label); cData.push(k.distCobro[c]); cColors.push(COBRO_CFG[c].color); } });
  chartCobro = donut('chartCobro', chartCobro, cLabels, cData, cColors);
}

function renderCategoria(k) {
  const cats = Object.keys(k.distCat).sort((a, b) => {
    const ia = CAT_ORDER.indexOf(a), ib = CAT_ORDER.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });
  document.getElementById('catRow').innerHTML = cats.length ? cats.map(c =>
    '<div class="cat-pill"><div class="cat-l">' + esc(c) + '</div><div class="cat-n">' + k.distCat[c] + '</div></div>'
  ).join('') : '<div class="empty">Sin datos</div>';
}

function barCell(pct, cls, show) {
  const w = show ? rnd(pct) : 0;
  return '<td class="barcell"><div style="display:flex;align-items:center;">' +
      '<div class="bar-track" style="flex:1;"><div class="bar-fill bg-' + cls + '" style="width:' + w + '%;"></div></div>' +
      '<span class="bar-pct ef-' + cls + '">' + (show ? rnd(pct) + '%' : '\u2014') + '</span>' +
    '</div></td>';
}

function renderTablaRuta(k) {
  document.getElementById('rutaCount').textContent = k.porRuta.length + ' ruta(s)';
  if (!k.porRuta.length) { document.getElementById('tablaRuta').innerHTML = '<div class="empty">Sin datos</div>'; return; }
  const filas = k.porRuta.map(g => {
    const cobCls = clsCobertura(g.cobertura);
    const conCls = g.tieneContacto ? clsConversion(g.conversion) : 'neutral';
    return '<tr>' +
      '<td class="nombre">' + esc(g.nombre) + '</td>' +
      '<td class="r">' + g.vendible + (g.bloqueados > 0 ? ' <span class="muted-sm">+' + g.bloqueados + ' CxC</span>' : '') + '</td>' +
      barCell(g.cobertura, cobCls, g.vendible > 0) +
      barCell(g.conversion, conCls, g.tieneContacto) +
      '<td class="r">' + fmtMoneyK(g.capturado) + '</td>' +
    '</tr>';
  }).join('');
  document.getElementById('tablaRuta').innerHTML =
    '<table><thead><tr><th>Ruta</th><th class="r">Vendibles</th><th>Cobertura</th><th>Conversi\u00f3n</th><th class="r">Capturado</th></tr></thead>' +
    '<tbody>' + filas + '</tbody></table>';
}
function renderTablaBackoffice(k) {
  document.getElementById('boCount').textContent = k.porBo.length + ' persona(s)';
  if (!k.porBo.length) { document.getElementById('tablaBackoffice').innerHTML = '<div class="empty">Sin datos</div>'; return; }
  const filas = k.porBo.map(g => {
    const cobCls = clsCobertura(g.cobertura);
    const conCls = g.tieneContacto ? clsConversion(g.conversion) : 'neutral';
    return '<tr>' +
      '<td class="nombre">' + esc(g.nombre) + '</td>' +
      '<td class="r">' + g.vendible + (g.bloqueados > 0 ? ' <span class="muted-sm">+' + g.bloqueados + ' CxC</span>' : '') + '</td>' +
      barCell(g.cobertura, cobCls, g.vendible > 0) +
      barCell(g.conversion, conCls, g.tieneContacto) +
      '<td class="r">' + g.sinContactar + '</td>' +
    '</tr>';
  }).join('');
  document.getElementById('tablaBackoffice').innerHTML =
    '<table><thead><tr><th>Backoffice</th><th class="r">Vendibles</th><th>Cobertura</th><th>Conversi\u00f3n</th><th class="r">Sin contactar</th></tr></thead>' +
    '<tbody>' + filas + '</tbody></table>';
}
